<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0a0a0a" stroke="#0a84ff" stroke-width="4"/>
  
  <!-- Fingerprint ridges (simplified concentric arcs) -->
  <g fill="none" stroke="#0a84ff" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <!-- Outer arcs -->
    <path d="M40 100 Q60 60 100 50 Q140 60 160 100" />
    <path d="M50 100 Q65 70 100 60 Q135 70 150 100" />
    <path d="M60 100 Q70 80 100 72 Q130 80 140 100" />
    <!-- Inner arcs -->
    <path d="M70 100 Q75 90 100 85 Q125 90 130 100" />
    <path d="M80 100 Q82 95 100 93 Q118 95 120 100" />
  </g>
  
  <!-- Center Benz star (three-pointed Mercedes star) -->
  <g transform="translate(100,100)">
    <!-- Circle around star -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#0a84ff" stroke-width="3"/>
    
    <!-- Three-pointed star -->
    <polygon points="0,-25 8,-8 25,0 8,8 0,25 -8,8 -25,0 -8,-8" fill="#0a84ff" stroke="#ffffff" stroke-width="1"/>
    <!-- Inner details for star look -->
    <polygon points="0,-18 6,-6 18,0 6,6 0,18 -6,6 -18,0 -6,-6" fill="#0a0a0a"/>
  </g>
  
  <!-- Fingerprint center dot -->
  <circle cx="100" cy="100" r="5" fill="#0a84ff"/>
</svg>
